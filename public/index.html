<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animally Tech Event 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🐾 Animally Tech Event 2026</h1>
            <p>A 1-day single-track event filled with wisdom from the animal kingdom.</p>
            <div class="search-container">
                <input type="text" id="categorySearch" placeholder="Search by category (e.g. AI, Agile, Security)...">
            </div>
        </div>
    </header>

    <main class="container">
        <div id="schedule" class="schedule-list">
            <!-- Schedule items will be injected here -->
            <p class="loading">Loading schedule...</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Animally Tech Event. All creatures welcome.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
